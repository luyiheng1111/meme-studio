<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEME STUDIO PRO - 跨平台表情包生成器</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MemeStudio">

    <!-- 基础依赖 -->
    <script src="./tailwindcss.js"></script>
    <script src="./react.production.min.js"></script>
    <script src="./react-dom.production.min.js"></script>
    <script src="./babel.min.js"></script>
    <script src="./lucide.js"></script>

    <style>
        @font-face {
            font-family: 'Inter';
            src: local('Inter'), local('sans-serif');
        }
        body { 
            background-color: #09090b; 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        /* 避免 iOS 橡皮跳动 */
        html, body { height: 100%; position: fixed; width: 100%; overflow: hidden; }
        #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
        .canvas-container {
            touch-action: none; /* 禁用默认手势，交给 JS 处理 */
        }
    </style>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // 图标组件
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- 应用主组件 ---
        function App() {
            const [step, setStep] = useState(1); // 1: 上传, 2: 编辑
            const [baseImg, setBaseImg] = useState(null);
            const [faceImg, setFaceImg] = useState(null);
            
            // 编辑状态
            const [config, setConfig] = useState({
                x: 256, y: 200, scale: 0.5, rotate: 0,
                brightness: 100, contrast: 100, threshold: 128, grayscale: true,
                feather: 5
            });

            const canvasRef = useRef(null);
            const faceCanvasRef = useRef(null); // 处理后的脸部离屏 Canvas
            const containerRef = useRef(null);
            const isDragging = useRef(false);
            const lastPos = useRef({ x: 0, y: 0 });

            // 处理上传
            const handleUpload = (type, e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        if (type === 'base') setBaseImg(img);
                        else {
                            setFaceImg(img);
                            setStep(2); // 上传完脸部自动进入编辑
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 核心绘制逻辑
            const draw = useCallback(() => {
                if (!canvasRef.current || !baseImg) return;
                const ctx = canvasRef.current.getContext('2d');
                const w = 512;
                const h = 512;
                canvasRef.current.width = w;
                canvasRef.current.height = h;

                // 1. 画底图
                ctx.clearRect(0, 0, w, h);
                ctx.drawImage(baseImg, 0, 0, w, h);

                // 2. 画脸部 (带滤镜)
                if (faceImg) {
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = faceImg.width;
                    tempCanvas.height = faceImg.height;

                    // 应用滤镜
                    tempCtx.filter = `brightness(${config.brightness}%) contrast(${config.contrast}%) grayscale(${config.grayscale ? 1 : 0})`;
                    tempCtx.drawImage(faceImg, 0, 0);

                    // 应用阈值 (熊猫头黑白效果)
                    if (config.grayscale) {
                        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                        const data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                            const val = avg > config.threshold ? 255 : 0;
                            data[i] = data[i+1] = data[i+2] = val;
                        }
                        tempCtx.putImageData(imageData, 0, 0);
                    }

                    // 绘制到主 Canvas
                    ctx.save();
                    ctx.translate(config.x, config.y);
                    ctx.rotate(config.rotate * Math.PI / 180);
                    const drawW = faceImg.width * config.scale;
                    const drawH = faceImg.height * config.scale;
                    
                    // 简单的羽化效果：在绘制前设置 globalAlpha 或使用阴影(性能开销大)
                    // 这里我们直接绘制
                    ctx.drawImage(tempCanvas, -drawW/2, -drawH/2, drawW, drawH);
                    ctx.restore();
                }
            }, [baseImg, faceImg, config]);

            useEffect(() => {
                draw();
            }, [draw]);

            // 触摸/鼠标交互
            const onStart = (e) => {
                isDragging.current = true;
                const pos = e.touches ? e.touches[0] : e;
                lastPos.current = { x: pos.clientX, y: pos.clientY };
            };

            const onMove = (e) => {
                if (!isDragging.current) return;
                const pos = e.touches ? e.touches[0] : e;
                const dx = pos.clientX - lastPos.current.x;
                const dy = pos.clientY - lastPos.current.y;
                setConfig(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
                lastPos.current = { x: pos.clientX, y: pos.clientY };
            };

            const onEnd = () => { isDragging.current = false; };

            const download = () => {
                const link = document.createElement('a');
                link.download = 'meme-pro-' + Date.now() + '.png';
                link.href = canvasRef.current.toDataURL('image/png');
                link.click();
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-200 flex flex-col items-center p-4 pb-20">
                    {/* Header */}
                    <div className="w-full max-w-lg flex flex-col items-center mb-8 pt-4">
                        <div className="p-3 bg-yellow-500 rounded-2xl shadow-[0_0_20px_rgba(234,179,8,0.3)] mb-4">
                            <Icon name="crown" size={32} className="text-zinc-950" />
                        </div>
                        <h1 className="text-2xl font-black tracking-tighter bg-gradient-to-r from-yellow-400 to-yellow-600 bg-clip-text text-transparent italic">MEME STUDIO PRO</h1>
                    </div>

                    {step === 1 ? (
                        <div className="w-full max-w-md space-y-6">
                            <label className="block border-2 border-dashed border-zinc-800 rounded-3xl p-10 text-center hover:border-yellow-500/50 transition-all cursor-pointer bg-zinc-900/30">
                                <Icon name="image" size={40} className="mx-auto mb-4 text-zinc-600" />
                                <p className="font-bold">上传表情包底图</p>
                                <p className="text-sm text-zinc-500 mt-1">支持 PNG, JPG, WEBP</p>
                                <input type="file" className="hidden" onChange={(e) => handleUpload('base', e)} accept="image/*" />
                                {baseImg && <div className="mt-4 text-yellow-500 text-xs font-bold uppercase">已选择底图 ✓</div>}
                            </label>

                            <label className={`block border-2 border-dashed rounded-3xl p-10 text-center transition-all cursor-pointer ${baseImg ? 'border-yellow-500/50 bg-yellow-500/5' : 'border-zinc-800 opacity-50 pointer-events-none'}`}>
                                <Icon name="user" size={40} className="mx-auto mb-4 text-yellow-500" />
                                <p className="font-bold">上传人脸照片</p>
                                <p className="text-sm text-zinc-500 mt-1 italic">上传后即刻进入工作台</p>
                                <input type="file" className="hidden" onChange={(e) => handleUpload('face', e)} accept="image/*" />
                            </label>
                        </div>
                    ) : (
                        <div className="w-full max-w-lg space-y-6">
                            {/* Canvas Display */}
                            <div className="relative aspect-square w-full rounded-2xl overflow-hidden glass-panel shadow-2xl canvas-container"
                                 onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd}
                                 onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>
                                <canvas ref={canvasRef} className="w-full h-full object-contain" />
                                
                                <div className="absolute top-4 right-4 flex gap-2">
                                    <button onClick={() => setStep(1)} className="p-3 rounded-full bg-zinc-900/80 text-zinc-400 border border-zinc-800">
                                        <Icon name="refresh-cw" size={18} />
                                    </button>
                                    <button onClick={download} className="px-6 py-3 rounded-full bg-yellow-500 text-zinc-950 font-bold shadow-lg flex items-center gap-2">
                                        <Icon name="download" size={18} /> 保存
                                    </button>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="p-6 rounded-3xl glass-panel space-y-6 custom-scrollbar max-h-[40vh] overflow-y-auto">
                                <div className="flex items-center justify-between mb-2">
                                    <h3 className="font-bold text-yellow-500 flex items-center gap-2">
                                        <Icon name="sliders" size={16} /> 调整参数
                                    </h3>
                                    <div className="flex gap-4">
                                        <label className="flex items-center gap-2 text-xs">
                                            <input type="checkbox" checked={config.grayscale} onChange={(e) => setConfig(prev => ({ ...prev, grayscale: e.target.checked }))} className="accent-yellow-500" /> 熊猫头滤镜
                                        </label>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <div className="flex justify-between text-xs text-zinc-500 mb-2"><span>大小缩放</span> <span>{Math.round(config.scale * 100)}%</span></div>
                                        <input type="range" min="0.1" max="2" step="0.01" value={config.scale} onChange={(e) => setConfig(prev => ({ ...prev, scale: parseFloat(e.target.value) }))} className="w-full accent-yellow-500" />
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-xs text-zinc-500 mb-2"><span>灰度阈值</span> <span>{config.threshold}</span></div>
                                        <input type="range" min="0" max="255" value={config.threshold} onChange={(e) => setConfig(prev => ({ ...prev, threshold: parseInt(e.target.value) }))} className="w-full accent-yellow-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <div className="text-xs text-zinc-500 mb-2">旋转角度</div>
                                            <input type="range" min="-180" max="180" value={config.rotate} onChange={(e) => setConfig(prev => ({ ...prev, rotate: parseInt(e.target.value) }))} className="w-full accent-yellow-500" />
                                        </div>
                                        <div>
                                            <div className="text-xs text-zinc-500 mb-2">对比度</div>
                                            <input type="range" min="0" max="300" value={config.contrast} onChange={(e) => setConfig(prev => ({ ...prev, contrast: parseInt(e.target.value) }))} className="w-full accent-yellow-500" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
